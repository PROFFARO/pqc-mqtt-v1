# ============================================================================
# mosquitto-classical.conf — Mosquitto broker config for classical TLS (baseline)
# Used for comparison benchmarks against PQC-TLS.
# ============================================================================

per_listener_settings true
log_type all
log_dest stderr

# --- Classical TLS Listener (port 8884 to avoid port clash) ---
listener 8884 0.0.0.0

# RSA certificates (change to ecdsa/ for ECDSA baseline)
cafile   ./pki/output/classical/rsa/ca.crt
certfile ./pki/output/classical/rsa/broker.crt
keyfile  ./pki/output/classical/rsa/broker.key

require_certificate true
use_identity_as_username true
tls_version tlsv1.3
