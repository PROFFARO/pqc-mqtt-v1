# ============================================================================
# mosquitto-pqc.conf — Mosquitto broker config for PQC-TLS (ML-DSA + ML-KEM)
# Start with: mosquitto -c broker/mosquitto-pqc.conf
# ============================================================================

# --- General ---
per_listener_settings true
log_type all
log_dest stderr

# --- PQC-TLS Listener (port 8883) ---
listener 8883 0.0.0.0

# Certificate paths (generated by pki/generate-pqc-certs.sh)
# These will be symlinked or updated by start-broker.sh
cafile   ./pki/output/pqc/ca.crt
certfile ./pki/output/pqc/broker.crt
keyfile  ./pki/output/pqc/broker.key

# Require mutual TLS (client certificate verification)
require_certificate true
use_identity_as_username true

# Force TLS 1.3
tls_version tlsv1.3

# --- Optional: Plain MQTT for health checks (port 1883) ---
listener 1883 127.0.0.1
allow_anonymous true
